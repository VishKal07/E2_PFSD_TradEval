version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: tradeval_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: tradeval
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: tradeval_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: .
    container_name: tradeval_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - redis
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/
      REDIS_URL: redis://redis:6379
      DEBUG: "True"
    volumes:
      - ./ml/model:/app/ml/model
      - ./frontend:/app/frontend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 tradeeval_backend.asgi:application"

volumes:
  mongodb_data:
  redis_data: