version: '3.8'
services:
  mongodb:
    image: mongo:6.0
    container_name: tradeval_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: tradeval_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - tradeval_network

  redis:
    image: redis:7-alpine
    container_name: tradeval_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tradeval_network

  backend:
    build: .
    container_name: tradeval_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGODB_HOST=mongodb://mongodb:27017
      - REDIS_HOST=redis
      - DEBUG=False
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./:/app
      - model_storage:/app/models
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - tradeval_network

  ml_worker:
    build: .
    container_name: tradeval_ml_worker
    restart: always
    environment:
      - MONGODB_HOST=mongodb://mongodb:27017
      - REDIS_HOST=redis
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./:/app
      - model_storage:/app/models
    command: python manage.py run_ml_scheduler
    networks:
      - tradeval_network

  frontend:
    build: ./frontend
    container_name: tradeval_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - tradeval_network

volumes:
  mongodb_data:
  redis_data:
  model_storage:

networks:
  tradeval_network:
    driver: bridge